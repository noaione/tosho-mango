# The following Actions/Workflow is to test tosho with latest nightly Rust compiler.
# This is to ensure that tosho is always compatible with the latest Rust compiler.
name: Nightly Check
on:
  # Run every 3 days at 00:00 UTC
  schedule:
    - cron: '0 0 */3 * *'
  # Manual trigger
  workflow_dispatch:

env:
  RUST_BACKTRACE: full
  CARGO_TERM_COLOR: always
  PKG_CONFIG_SYSROOT_DIR: /
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22
        with:
          submodules: 'true'

      - name: Rustup nightly
        run: |
          rustup update nightly
      
      - name: Test and Build
        run: |
          cargo +nightly test --verbose --all
          cargo +nightly build --release --verbose --all
