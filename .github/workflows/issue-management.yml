name: Issue Management

on:
  issues:
    types:
      - opened

jobs:
  auto-assign:
    runs-on: ubuntu-24.04
    # run on issue opened, and run in my repo
    if: github.event.issue.pull_request == null && github.event.repository.owner.login == 'noaione'
    permissions:
      issues: write
    steps:
      - name: Assign author
        uses: pozil/auto-assign-issue@af6beea6bdf1e8eb373f061c5bc168681fc6d011
        with:
          assignees: noaione
          numOfAssignee: 1
          allowSelfAssign: true
